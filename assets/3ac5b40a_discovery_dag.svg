<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 1520" font-family="'SF Mono','Fira Code','Consolas',monospace">
  <defs>
    <marker id="a" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="6" markerHeight="4.5" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="6" markerHeight="4.5" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
  <style>
    .L{font-size:9px;fill:#9ca3af;font-weight:700;letter-spacing:2px}
    .n{font-size:10px;fill:#e5e7eb;text-anchor:middle}
    .nb{font-size:10px;fill:#e5e7eb;text-anchor:middle;font-weight:700}
    .ns{font-size:8px;fill:#93c5fd;text-anchor:middle}
    .dn{font-size:9px;fill:#374151;text-anchor:middle;font-weight:600}
    .ds{font-size:8px;fill:#6b7280;text-anchor:middle}
    .e{stroke:#4b5563;stroke-width:1;fill:none;marker-end:url(#a)}
    .cf{stroke:#dc2626;stroke-width:1;stroke-dasharray:5 3;fill:none;marker-end:url(#ar)}
  </style>

  <!-- Background -->
  <rect width="580" height="1520" fill="#0f172a"/>

  <!-- ═══ L0: TYPES  y=40 ═══ -->
  <text x="20" y="30" class="L">L0  TYPES</text>
  <line x1="20" y1="36" x2="560" y2="36" stroke="#1e293b" stroke-width="1"/>

  <!-- ConceptClass (center, hub node) -->
  <rect x="210" y="48" width="160" height="38" rx="5" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="290" y="64" class="nb">ConceptClass</text>
  <text x="290" y="78" class="ns">22 edges, hub</text>

  <!-- BatchLearner -->
  <rect x="30" y="48" width="120" height="34" rx="4" fill="#1e293b" stroke="#475569"/>
  <text x="90" y="70" class="n">BatchLearner</text>

  <!-- OnlineLearner -->
  <rect x="430" y="48" width="125" height="34" rx="4" fill="#1e293b" stroke="#475569"/>
  <text x="493" y="70" class="n">OnlineLearner</text>

  <!-- GoldLearner + Measure.pi (smaller, flanking) -->
  <rect x="30" y="96" width="110" height="30" rx="4" fill="#1e293b" stroke="#475569"/>
  <text x="85" y="115" class="n">GoldLearner</text>

  <rect x="440" y="96" width="110" height="30" rx="4" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="495" y="115" class="n">Measure.pi</text>

  <!-- ═══ L1: MEASURES  y=175 ═══ -->
  <text x="20" y="165" class="L">L1  MEASURES</text>
  <line x1="20" y1="171" x2="560" y2="171" stroke="#1e293b" stroke-width="1"/>

  <!-- VCDim (center, highest fan-out) -->
  <rect x="195" y="183" width="130" height="34" rx="4" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="260" y="204" class="nb">VCDim &lt; ∞</text>

  <!-- LittlestoneDim (right) -->
  <rect x="380" y="183" width="150" height="34" rx="4" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="455" y="204" class="n">LittlestoneDim &lt; ∞</text>

  <!-- GrowthFunction (left) -->
  <rect x="40" y="183" width="120" height="34" rx="4" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="100" y="204" class="n">GrowthFunction</text>

  <!-- Rademacher (far left) -->
  <rect x="40" y="230" width="120" height="34" rx="4" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="100" y="251" class="n">Rademacher → 0</text>

  <!-- MindChangeOrdinal (far right) -->
  <rect x="400" y="230" width="145" height="34" rx="4" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="473" y="251" class="n">MindChangeOrd.</text>

  <!-- L0→L1 edges -->
  <line x1="290" y1="86" x2="260" y2="183" class="e"/>
  <line x1="290" y1="86" x2="455" y2="183" class="e"/>
  <line x1="290" y1="86" x2="100" y2="183" class="e"/>
  <line x1="290" y1="86" x2="100" y2="230" class="e"/>
  <line x1="290" y1="86" x2="473" y2="230" class="e"/>

