  <text x="20" y="300" class="L">L2  INFRASTRUCTURE</text>
  <line x1="20" y1="306" x2="560" y2="306" stroke="#1e293b" stroke-width="1"/>

  <!-- Central column: Symmetrization (biggest node) -->
  <rect x="175" y="318" width="170" height="44" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="260" y="337" class="nb">Symmetrization</text>
  <text x="260" y="353" class="ns">3,027 lines</text>

  <!-- Uniform Convergence (above sym, same column) -->
  <rect x="370" y="318" width="150" height="34" rx="4" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="445" y="339" class="n">Uniform Conv.</text>

  <!-- WellBehavedVC -->
  <rect x="370" y="365" width="140" height="30" rx="4" fill="#2563eb" stroke="#1d4ed8"/>
